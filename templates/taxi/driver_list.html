{% extends "base.html" %}

{% block content %}
  <h1>Driver List</h1>

  <ul>
    {% for driver in driver_list %}
      <li>
        <a href="{% url 'taxi:driver-detail' pk=driver.id %}">{{ driver.username }}</a>
      </li>
    {% empty %}
      <li>No Drivers found.</li>
    {% endfor %}
  </ul>
  {% include "includes/pagination.html" %}
{% endblock %}
